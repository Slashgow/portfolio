<div class="info-grid">

    <h2>About</h2>
    <p>{{ include.about }}</p>
  </div>

  <div class="info-card">
    <h2>Project Info</h2>

      <li>Engine: <b>{{ include.engine }}</b></li>
    </ul>
  </div>
</div>
